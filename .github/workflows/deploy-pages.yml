# ============================================================
# Urwort — Deploy game to GitHub Pages
# ============================================================
# Trigger: push to `pages-deploy` branch
# Builds the Vite game client and deploys to GitHub Pages.
#
# Setup (one-time):
#   1. Go to repo Settings → Pages
#   2. Set Source to "GitHub Actions"
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - pages-deploy

# Use Node.js 24 to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Sets permissions of the GITHUB_TOKEN for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: game/package-lock.json

      - name: Install dependencies
        working-directory: game
        run: npm ci

      - name: Build
        working-directory: game
        run: npm run build
        env:
          # Vite reads this at build time for the base path
          VITE_BASE_PATH: /urwort/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: game/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
