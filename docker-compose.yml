# ============================================================
# Urwort — Phase 0 Development Environment
# ============================================================
# Runs the game (Vite) and API (FastAPI) in a single container.
#
# Usage:
#   ./dev.sh               # start + open interactive shell
#   ./deploy.sh            # export ontology + build + deploy
#   docker compose logs -f # tail logs
# ============================================================

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: urwort-dev
    user: "node"
    ports:
      - "5173:5173"   # Vite dev server (game)
      - "8000:8000"   # FastAPI (API)
    volumes:
      # Mount source code for live editing (HMR)
      - ./game:/workspace/game
      - ./api:/workspace/api
      - ./tools:/workspace/tools
      - ./data:/workspace/data
      - ./raw-data:/workspace/raw-data
      # Persist node_modules inside container (avoid host/container mismatch)
      - urwort_node_modules:/workspace/game/node_modules
    environment:
      - NODE_ENV=development
      - URWORT_DB_PATH=/workspace/data/urwort.db
      - HOME=/home/node
    # Start Vite dev server + FastAPI
    command: >
      bash -c "
        cd /workspace/game && npm install &&
        npm run dev &
        cd /workspace && python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir api &
        wait
      "

volumes:
  urwort_node_modules:
