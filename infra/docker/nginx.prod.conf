# infra/docker/nginx.prod.conf
# Production server — gzip on, aggressive caching for static assets,
# no-cache for SW/HTML shell, API requests proxied to urwort-api.

server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Correct MIME types
    include /etc/nginx/mime.types;
    types {
        application/json          json;
        application/manifest+json webmanifest;
        text/javascript           js mjs;
    }

    # Gzip — reduces JS/JSON payload by ~60-70 %
    gzip            on;
    gzip_static     on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # ── API proxy ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://urwort-api:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Service worker + HTML shell — never cache ────────────────────────────
    location ~* \/(sw\.js|index\.html|manifest\.json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Versioned static assets — immutable 1-year cache ────────────────────
    location ~* \.(css|js|png|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Dictionary data chunks ───────────────────────────────────────────────
    location /data/ {
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
