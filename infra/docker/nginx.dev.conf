# infra/docker/nginx.dev.conf
# Development server — NO caching, verbose errors, live-reload friendly.
# sw.js gets no-cache so the service worker never goes stale during dev.

server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Correct MIME types
    include /etc/nginx/mime.types;
    types {
        application/json              json;
        application/manifest+json     webmanifest;
        text/javascript               js mjs;
    }

    # Disable ALL caching in dev — every request goes to disk
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma        "no-cache"                            always;
    add_header Expires       "0"                                   always;

    # CORS for data chunks (useful when testing from phone on LAN)
    add_header Access-Control-Allow-Origin "*" always;

    # Proxy API requests to FastAPI backend
    location /api/ {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "*"              always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS"   always;
            add_header Access-Control-Allow-Headers "*"              always;
            add_header Access-Control-Max-Age       3600             always;
            add_header Content-Type "text/plain charset=UTF-8"       always;
            add_header Content-Length 0                              always;
            return 204;
        }

        proxy_pass http://urwort-api:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin  "*"            always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*"            always;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
