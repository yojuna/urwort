server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Correct MIME types
    include /etc/nginx/mime.types;
    types {
        application/json  json;
        application/manifest+json  webmanifest;
    }

    # Never cache the service worker or the HTML shell —
    # the browser must always re-validate these so updates propagate.
    location ~* \/(sw\.js|index\.html)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache static assets (css, js, icons) aggressively — they're versioned via SW cache name
    location ~* \.(css|js|png|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Dictionary data chunks — short cache, SW handles offline
    location /data/ {
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
    }

    # SPA fallback — all routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
