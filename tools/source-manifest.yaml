# Urwort — Data Source Manifest
# All raw data sources used to build urwort.db and ontology.json.
# Enables anyone to reproduce the build from scratch.

sources:

  freedict:
    name: FreeDict German-English
    url: https://freedict.org/
    files:
      - raw-data/freedict/deu-eng/deu-eng.idx.gz
      - raw-data/freedict/deu-eng/deu-eng.dict.dz
    format: StarDict (gzipped index + dictzip dictionary)
    license: GPL-3.0
    provides: base entries, translations, examples

  kaikki:
    name: Kaikki.org German Wiktionary Extract
    url: https://kaikki.org/dictionary/German/
    files:
      - raw-data/kaikki/kaikki.org-dictionary-German-by-pos-noun.jsonl
      - raw-data/kaikki/kaikki.org-dictionary-German-by-pos-verb.jsonl
      - raw-data/kaikki/kaikki.org-dictionary-German-by-pos-adj.jsonl
    format: JSONL (one JSON object per line)
    license: CC BY-SA 3.0 (Wiktionary)
    provides: >
      senses/glosses, etymology_templates, inflections, synonyms,
      antonyms, hypernyms, hyponyms, derived forms, pronunciation,
      subject domains, usage labels

  ipa_dict:
    name: IPA Dict - German
    url: https://github.com/open-dict-data/ipa-dict
    files:
      - raw-data/ipa-dict/de.tsv
    format: TSV (word, IPA)
    license: MIT
    provides: IPA pronunciation (supplements Kaikki IPA)

  cefr:
    name: CEFR Word Lists - German
    url: https://github.com/lschmelzeisen/cefr-word-lists
    files:
      - raw-data/cefr/de.tsv
    format: TSV (word, level)
    license: CC BY 4.0
    provides: A1/A2/B1/B2/C1/C2 level tags

  fasttext_cc_de_300:
    name: fastText German Word Vectors (Common Crawl + Wikipedia)
    url: https://dl.fbaipublicfiles.com/fasttext/vectors-crawl/cc.de.300.vec.gz
    files:
      - raw-data/fasttext/cc.de.300.vec
    format: word2vec text format (word + 300-dim vector per line)
    dimensions: 300
    vocabulary: "~2M words"
    compressed_size: "~1.2GB"
    uncompressed_size: "~4.5GB"
    license: CC-BY-SA-3.0
    citation: "Grave et al., Learning Word Vectors for 157 Languages, LREC 2018"
    provides: >
      word embeddings for spatial layout computation (Phase 1A).
      Used by tools/compute-layout.py to compute UMAP cluster positions.

build:
  tool: tools/build-db.py
  output: data/urwort.db
  export: tools/export-ontology.py
  layout: tools/compute-layout.py
  schema: tools/schema.sql
