<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Urwort</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #E8E4D9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      color: #1A1A2E;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Prevent browser-level gestures so Three.js gets all touch events */
    canvas {
      touch-action: none;
      display: block;
    }

    /* Loading screen */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #E8E4D9;
      z-index: 1000;
      transition: opacity 0.5s ease-out;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: #1A1A2E;
      margin-bottom: 1rem;
    }

    #loading p {
      font-size: 0.9rem;
      color: #666;
      font-style: italic;
    }

    #loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(26, 26, 46, 0.15);
      border-top-color: #2D6A4F;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 1.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <h1>URWORT</h1>
      <p>The world is the ontology. The map is the language.</p>
      <div class="spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
