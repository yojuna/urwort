# nginx.dev.conf
# Development server — NO caching on anything, verbose errors, live reload friendly.
# sw.js gets no-cache so service worker never gets stale during dev.

server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Correct MIME types
    include /etc/nginx/mime.types;
    types {
        application/json              json;
        application/manifest+json     webmanifest;
        text/javascript               js mjs;
    }

    # Disable ALL caching in dev — every request goes to disk
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma        "no-cache"                            always;
    add_header Expires       "0"                                   always;

    # CORS for data chunks (useful when testing from phone on LAN)
    add_header Access-Control-Allow-Origin "*" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
