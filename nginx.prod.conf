# nginx.prod.conf
# Production server — gzip on, aggressive caching, strict SW/HTML no-cache.

server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Correct MIME types
    include /etc/nginx/mime.types;
    types {
        application/json              json;
        application/manifest+json     webmanifest;
        text/javascript               js mjs;
    }

    # Gzip — reduces JS/JSON payload by ~60-70%
    gzip            on;
    gzip_static     on;       # serve .gz pre-compressed files if present
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Service worker + HTML shell — NEVER cache; must re-validate on every load
    # so that a new deployment is picked up immediately.
    location ~* \/(sw\.js|index\.html|manifest\.json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Versioned static assets (css/js/icons) — cache 1 year, immutable.
    # Cache-busting is handled by bumping the SW cache name in sw.js.
    location ~* \.(css|js|png|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Dictionary data chunks — cache 1 day (SW handles offline)
    location /data/ {
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
    }

    # SPA fallback — hash-routing, all paths → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
